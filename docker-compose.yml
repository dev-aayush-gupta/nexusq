services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusq-postgres
    environment:
      POSTGRES_DB: nexusq
      POSTGRES_USER: nexusq
      POSTGRES_PASSWORD: nexusq
    ports:
      - "5433:5432"
    volumes:
      - nexusq-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusq -d nexusq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexusq-redis
    ports:
      - "6380:6379"
    volumes:
      - nexusq-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: nexusq-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — no Zookeeper needed
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: nexusq-local-cluster
    volumes:
      - nexusq-kafka-data:/var/lib/kafka/data

volumes:
  nexusq-postgres-data:
  nexusq-redis-data:
  nexusq-kafka-data:
